<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>写作案头</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap');
body { margin: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

function Ico({ name, size = 14, color, style, className }) {
  const MAP = {
    Plus: "＋", Pencil: "✎", Trash2: "🗑", Users: "👥", Network: "🕸",
    ListTree: "☰", Download: "⬇", X: "✕", Share2: "🔗", FolderPlus: "📁",
    Check: "✓", ChevronRight: "›", BookOpen: "📖", Rows3: "▦", GalleryVerticalEnd: "🕓",
  };
  return (
    <span
      className={className}
      style={{ fontSize: size, lineHeight: 1, display: "inline-block", color, ...style }}
    >
      {MAP[name] || ""}
    </span>
  );
}


const COLORS = {
  paper: "#F1E8D6",
  paperDark: "#E6D9BB",
  paperDarker: "#D9C79E",
  ink: "#2A241C",
  inkSoft: "#6B6250",
  seal: "#B23A24",
  sealSoft: "#E9C7BC",
  jade: "#3B6E5E",
  jadeSoft: "#CFE0D8",
  brass: "#A9812E",
  brassSoft: "#EAD9A8",
  grey: "#8A8378",
  greySoft: "#DDD6C6",
  line: "#C9B98F",
};

const STATUS_LIST = ["未写", "写作中", "已完成"];
const STATUS_COLOR = { 未写: COLORS.grey, 写作中: COLORS.brass, 已完成: COLORS.jade };
const STATUS_SOFT = { 未写: COLORS.greySoft, 写作中: COLORS.brassSoft, 已完成: COLORS.jadeSoft };

const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

const FONT_IMPORT = `@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap');`;

function Seal({ text, size = 34, rotate = -6 }) {
  return (
    <div
      style={{
        width: size,
        height: size,
        borderRadius: "50%",
        border: `2px solid ${COLORS.seal}`,
        color: COLORS.seal,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        fontFamily: "'Noto Serif SC', serif",
        fontWeight: 900,
        fontSize: size * 0.34,
        transform: `rotate(${rotate}deg)`,
        flexShrink: 0,
        background: "rgba(178,58,36,0.05)",
        letterSpacing: "-1px",
      }}
    >
      {text?.slice(0, 2)}
    </div>
  );
}

function Field({ label, children }) {
  return (
    <label className="block mb-3">
      <span
        className="block text-xs mb-1 tracking-wide"
        style={{ color: COLORS.inkSoft, fontFamily: "'Noto Sans SC', sans-serif" }}
      >
        {label}
      </span>
      {children}
    </label>
  );
}

function TextInput(props) {
  return (
    <input
      {...props}
      className={"w-full bg-transparent border-b py-1.5 text-sm focus:outline-none " + (props.className || "")}
      style={{ borderColor: COLORS.line, color: COLORS.ink, fontFamily: "'Noto Sans SC', sans-serif", ...props.style }}
    />
  );
}

function TextArea(props) {
  return (
    <textarea
      {...props}
      className={"w-full bg-transparent border rounded-sm p-2 text-sm focus:outline-none " + (props.className || "")}
      style={{ borderColor: COLORS.line, color: COLORS.ink, fontFamily: "'Noto Sans SC', sans-serif", minHeight: 70, ...props.style }}
    />
  );
}

function Select(props) {
  return (
    <select
      {...props}
      className={"w-full bg-transparent border-b py-1.5 text-sm focus:outline-none " + (props.className || "")}
      style={{ borderColor: COLORS.line, color: COLORS.ink, fontFamily: "'Noto Sans SC', sans-serif", ...props.style }}
    >
      {props.children}
    </select>
  );
}

function Btn({ children, onClick, variant = "primary", small, style, type = "button" }) {
  const base = {
    primary: { background: COLORS.seal, color: "#F8F0E3" },
    ghost: { background: "transparent", color: COLORS.ink, border: `1px solid ${COLORS.line}` },
    subtle: { background: COLORS.paperDark, color: COLORS.ink },
  }[variant];
  return (
    <button
      type={type}
      onClick={onClick}
      className={`inline-flex items-center gap-1.5 rounded-sm font-medium transition-opacity hover:opacity-80 ${small ? "px-2.5 py-1 text-xs" : "px-4 py-2 text-sm"}`}
      style={{ fontFamily: "'Noto Sans SC', sans-serif", ...base, ...style }}
    >
      {children}
    </button>
  );
}

function Modal({ title, onClose, children, wide }) {
  return (
    <div
      className="fixed inset-0 z-50 flex items-center justify-center p-4"
      style={{ background: "rgba(42,36,28,0.45)" }}
      onClick={onClose}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        className={`w-full ${wide ? "max-w-2xl" : "max-w-md"} max-h-[85vh] overflow-y-auto rounded-sm shadow-xl`}
        style={{ background: COLORS.paper, border: `1px solid ${COLORS.line}` }}
      >
        <div
          className="flex items-center justify-between px-5 py-3 sticky top-0"
          style={{ background: COLORS.paperDark, borderBottom: `1px solid ${COLORS.line}` }}
        >
          <h3 className="text-base font-bold" style={{ fontFamily: "'Noto Serif SC', serif", color: COLORS.ink }}>
            {title}
          </h3>
          <button onClick={onClose} style={{ color: COLORS.inkSoft }}>
            <Ico name="X" size={18} />
          </button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}

function EmptyState({ icon, title, hint, action }) {
  return (
    <div className="flex flex-col items-center justify-center text-center py-16 px-6">
      <Ico name={icon} size={30} style={{ color: COLORS.brass }} className="mb-3" />
      <p className="text-sm font-bold mb-1" style={{ color: COLORS.ink, fontFamily: "'Noto Serif SC', serif" }}>
        {title}
      </p>
      <p className="text-xs mb-4 max-w-xs" style={{ color: COLORS.inkSoft }}>
        {hint}
      </p>
      {action}
    </div>
  );
}

function WritersHub() {
  const [data, setData] = useState({ projects: [], characters: [], relationships: [], nodes: [] });
  const [loading, setLoading] = useState(true);
  const [currentProjectId, setCurrentProjectId] = useState(null);
  const [tab, setTab] = useState("characters");
  const [nodesView, setNodesView] = useState("timeline");

  const [showProjectModal, setShowProjectModal] = useState(false);
  const [editProject, setEditProject] = useState(null);
  const [editingCharacter, setEditingCharacter] = useState(null);
  const [editingNode, setEditingNode] = useState(null);
  const [showRelModal, setShowRelModal] = useState(false);
  const [showSharedLib, setShowSharedLib] = useState(false);
  const [showExport, setShowExport] = useState(false);
  const [exportSel, setExportSel] = useState({ characters: true, nodes: true });

  useEffect(() => {
    (async () => {
      try {
        const raw = localStorage.getItem("writers-hub-data");
        if (raw) {
          const parsed = JSON.parse(raw);
          const loaded = {
            projects: parsed.projects || [],
            characters: parsed.characters || [],
            relationships: parsed.relationships || [],
            nodes: parsed.nodes || [],
          };
          setData(loaded);
          if (loaded.projects.length > 0) setCurrentProjectId(loaded.projects[0].id);
        }
      } catch (e) {
        // 没有数据，保持默认空状态
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  const persist = (newData) => {
    setData(newData);
    (async () => {
      try {
        localStorage.setItem("writers-hub-data", JSON.stringify(newData));
      } catch (e) {
        console.error("保存失败", e);
      }
    })();
  };

  const project = data.projects.find((p) => p.id === currentProjectId) || null;
  const chars = useMemo(
    () => data.characters.filter((c) => c.projectId === currentProjectId),
    [data.characters, currentProjectId]
  );
  const rels = useMemo(
    () => data.relationships.filter((r) => r.projectId === currentProjectId),
    [data.relationships, currentProjectId]
  );
  const nodes = useMemo(
    () => data.nodes.filter((n) => n.projectId === currentProjectId).sort((a, b) => a.order - b.order),
    [data.nodes, currentProjectId]
  );
  const sharedChars = useMemo(() => data.characters.filter((c) => c.shared), [data.characters]);
  const charName = (id) => data.characters.find((c) => c.id === id)?.name || "?";

  // ---- 项目 ----
  const saveProject = (form) => {
    if (editProject && editProject.id) {
      persist({
        ...data,
        projects: data.projects.map((p) => (p.id === editProject.id ? { ...p, ...form } : p)),
      });
    } else {
      const id = genId();
      persist({ ...data, projects: [...data.projects, { id, createdAt: Date.now(), ...form }] });
      setCurrentProjectId(id);
    }
    setShowProjectModal(false);
    setEditProject(null);
  };
  const deleteProject = (id) => {
    persist({
      ...data,
      projects: data.projects.filter((p) => p.id !== id),
      characters: data.characters.filter((c) => c.projectId !== id),
      relationships: data.relationships.filter((r) => r.projectId !== id),
      nodes: data.nodes.filter((n) => n.projectId !== id),
    });
    if (currentProjectId === id) {
      const remain = data.projects.filter((p) => p.id !== id);
      setCurrentProjectId(remain[0]?.id || null);
    }
  };

  // ---- 人物 ----
  const saveCharacter = (form) => {
    if (editingCharacter && editingCharacter.id) {
      persist({ ...data, characters: data.characters.map((c) => (c.id === editingCharacter.id ? { ...c, ...form } : c)) });
    } else {
      persist({
        ...data,
        characters: [...data.characters, { id: genId(), projectId: currentProjectId, shared: false, ...form }],
      });
    }
    setEditingCharacter(null);
  };
  const deleteCharacter = (id) => {
    persist({
      ...data,
      characters: data.characters.filter((c) => c.id !== id),
      relationships: data.relationships.filter((r) => r.fromId !== id && r.toId !== id),
      nodes: data.nodes.map((n) => ({ ...n, linkedCharacterIds: (n.linkedCharacterIds || []).filter((cid) => cid !== id) })),
    });
  };
  const toggleShared = (c) => {
    persist({ ...data, characters: data.characters.map((x) => (x.id === c.id ? { ...x, shared: !x.shared } : x)) });
  };
  const importSharedCharacter = (c) => {
    persist({
      ...data,
      characters: [
        ...data.characters,
        { ...c, id: genId(), projectId: currentProjectId, shared: false, importedFrom: c.name },
      ],
    });
    setShowSharedLib(false);
  };

  // ---- 关系 ----
  const saveRelationship = (form) => {
    persist({ ...data, relationships: [...data.relationships, { id: genId(), projectId: currentProjectId, ...form }] });
    setShowRelModal(false);
  };
  const deleteRelationship = (id) => {
    persist({ ...data, relationships: data.relationships.filter((r) => r.id !== id) });
  };

  // ---- 节点 ----
  const saveNode = (form) => {
    if (editingNode && editingNode.id) {
      persist({ ...data, nodes: data.nodes.map((n) => (n.id === editingNode.id ? { ...n, ...form } : n)) });
    } else {
      const order = form.order ?? nodes.length + 1;
      persist({
        ...data,
        nodes: [...data.nodes, { id: genId(), projectId: currentProjectId, linkedCharacterIds: [], ...form, order }],
      });
    }
    setEditingNode(null);
  };
  const deleteNode = (id) => {
    persist({ ...data, nodes: data.nodes.filter((n) => n.id !== id) });
  };

  // ---- 导出 ----
  const doExport = () => {
    if (!project) return;
    let md = `# ${project.name}\n\n`;
    if (exportSel.characters && chars.length) {
      md += `## 人物\n\n`;
      chars.forEach((c) => {
        md += `### ${c.name}${c.camp ? `（${c.camp}）` : ""}\n\n`;
        if (c.brief) md += `${c.brief}\n\n`;
        md += `- 外貌：${c.appearance || "—"}\n- 性格：${c.personality || "—"}\n- 能力：${c.abilities || "—"}\n\n`;
      });
    }
    if (exportSel.nodes && nodes.length) {
      md += `## ${project.containerLabel || "节点"}\n\n`;
      nodes.forEach((n) => {
        md += `### [${n.order}] ${n.name}（${n.status}）\n\n${n.summary || ""}\n\n字数：${n.wordcount || 0}\n\n`;
        const linked = (n.linkedCharacterIds || []).map(charName).join("、");
        if (linked) md += `相关人物：${linked}\n\n`;
      });
    }
    const blob = new Blob([md], { type: "text/markdown;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${project.name}.md`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setShowExport(false);
  };

  if (loading) {
    return (
      <div className="h-screen flex items-center justify-center" style={{ background: COLORS.paper, color: COLORS.inkSoft }}>
        <style>{FONT_IMPORT}</style>
        加载中…
      </div>
    );
  }

  return (
    <div className="h-screen flex overflow-hidden" style={{ background: COLORS.paper, fontFamily: "'Noto Sans SC', sans-serif" }}>
      <style>{FONT_IMPORT}</style>

      {/* 侧边栏 */}
      <aside
        className="w-60 shrink-0 flex flex-col"
        style={{ background: COLORS.paperDark, borderRight: `1px solid ${COLORS.line}` }}
      >
        <div className="px-4 py-4 flex items-center gap-2" style={{ borderBottom: `1px solid ${COLORS.line}` }}>
          <Seal text="案" size={30} />
          <h1 className="text-lg font-bold" style={{ fontFamily: "'Noto Serif SC', serif", color: COLORS.ink }}>
            写作案头
          </h1>
        </div>

        <div className="flex-1 overflow-y-auto px-3 py-3">
          <div className="flex items-center justify-between px-1 mb-2">
            <span className="text-xs font-bold tracking-wide" style={{ color: COLORS.inkSoft }}>
              项目
            </span>
            <button
              onClick={() => {
                setEditProject({});
                setShowProjectModal(true);
              }}
              style={{ color: COLORS.seal }}
              title="新建项目"
            >
              <Ico name="FolderPlus" size={16} />
            </button>
          </div>

          {data.projects.length === 0 && (
            <p className="text-xs px-1" style={{ color: COLORS.inkSoft }}>
              还没有项目，点右上角图标新建一个。
            </p>
          )}

          <div className="space-y-1">
            {data.projects.map((p) => (
              <div
                key={p.id}
                onClick={() => setCurrentProjectId(p.id)}
                className="group flex items-center gap-2 px-2 py-1.5 rounded-sm cursor-pointer"
                style={{
                  background: p.id === currentProjectId ? COLORS.sealSoft : "transparent",
                }}
              >
                <Seal text={p.name} size={22} rotate={0} />
                <span
                  className="flex-1 text-sm truncate"
                  style={{ color: COLORS.ink, fontFamily: "'Noto Serif SC', serif" }}
                >
                  {p.name}
                </span>
                <button
                  className="opacity-0 group-hover:opacity-100"
                  onClick={(e) => {
                    e.stopPropagation();
                    setEditProject(p);
                    setShowProjectModal(true);
                  }}
                  style={{ color: COLORS.inkSoft }}
                >
                  <Ico name="Pencil" size={12} />
                </button>
                <button
                  className="opacity-0 group-hover:opacity-100"
                  onClick={(e) => {
                    e.stopPropagation();
                    if (confirm(`删除项目「${p.name}」？其下所有人物与节点也会被删除。`)) deleteProject(p.id);
                  }}
                  style={{ color: COLORS.seal }}
                >
                  <Ico name="Trash2" size={12} />
                </button>
              </div>
            ))}
          </div>
        </div>

        <button
          onClick={() => setShowSharedLib(true)}
          className="mx-3 mb-3 flex items-center gap-2 px-3 py-2 rounded-sm text-sm"
          style={{ background: COLORS.paperDarker, color: COLORS.ink }}
        >
          <Ico name="Share2" size={14} style={{ color: COLORS.jade }} />
          共享人物库（{sharedChars.length}）
        </button>
      </aside>

      {/* 主区域 */}
      <main className="flex-1 flex flex-col overflow-hidden">
        {!project ? (
          <EmptyState
            icon="BookOpen"
            title="选一个项目，或新建一个开始"
            hint="每个项目独立管理自己的人物、关系和剧情节点，节点的名字（卷/篇/番外…）由你自己定。"
            action={
              <Btn onClick={() => { setEditProject({}); setShowProjectModal(true); }}>
                <Ico name="Plus" size={14} /> 新建项目
              </Btn>
            }
          />
        ) : (
          <>
            <header className="px-6 py-4 flex items-center justify-between" style={{ borderBottom: `1px solid ${COLORS.line}` }}>
              <div className="flex items-center gap-3">
                <h2 className="text-xl font-bold" style={{ fontFamily: "'Noto Serif SC', serif", color: COLORS.ink }}>
                  {project.name}
                </h2>
                <span
                  className="text-xs px-2 py-0.5 rounded-sm"
                  style={{ background: COLORS.paperDark, color: COLORS.inkSoft }}
                >
                  容器名：{project.containerLabel || "节点"}
                </span>
              </div>
              <Btn variant="ghost" small onClick={() => setShowExport(true)}>
                <Ico name="Download" size={13} /> 导出
              </Btn>
            </header>

            <nav className="px-6 flex gap-1 pt-3" style={{ borderBottom: `1px solid ${COLORS.line}` }}>
              {[
                { id: "characters", label: "人物", icon: "Users" },
                { id: "graph", label: "关系图", icon: "Network" },
                { id: "nodes", label: "剧情节点", icon: "ListTree" },
              ].map((t) => (
                <button
                  key={t.id}
                  onClick={() => setTab(t.id)}
                  className="flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-t-sm"
                  style={{
                    background: tab === t.id ? COLORS.paper : "transparent",
                    color: tab === t.id ? COLORS.seal : COLORS.inkSoft,
                    border: tab === t.id ? `1px solid ${COLORS.line}` : "1px solid transparent",
                    borderBottom: tab === t.id ? `1px solid ${COLORS.paper}` : "1px solid transparent",
                    marginBottom: -1,
                  }}
                >
                  <Ico name={t.icon} size={14} /> {t.label}
                </button>
              ))}
            </nav>

            <div className="flex-1 overflow-y-auto px-6 py-5">
              {tab === "characters" && (
                <CharactersTab
                  chars={chars}
                  onAdd={() => setEditingCharacter({})}
                  onEdit={(c) => setEditingCharacter(c)}
                  onDelete={deleteCharacter}
                  onToggleShared={toggleShared}
                />
              )}
              {tab === "graph" && (
                <GraphTab chars={chars} rels={rels} onAddRel={() => setShowRelModal(true)} onDeleteRel={deleteRelationship} />
              )}
              {tab === "nodes" && (
                <NodesTab
                  nodes={nodes}
                  chars={chars}
                  containerLabel={project.containerLabel || "节点"}
                  view={nodesView}
                  setView={setNodesView}
                  onAdd={() => setEditingNode({})}
                  onEdit={(n) => setEditingNode(n)}
                  onDelete={deleteNode}
                />
              )}
            </div>
          </>
        )}
      </main>

      {/* 项目弹窗 */}
      {showProjectModal && (
        <ProjectModal
          initial={editProject}
          onClose={() => {
            setShowProjectModal(false);
            setEditProject(null);
          }}
          onSave={saveProject}
        />
      )}

      {/* 人物弹窗 */}
      {editingCharacter && (
        <CharacterModal initial={editingCharacter} onClose={() => setEditingCharacter(null)} onSave={saveCharacter} />
      )}

      {/* 节点弹窗 */}
      {editingNode && (
        <NodeModal
          initial={editingNode}
          chars={chars}
          containerLabel={project?.containerLabel || "节点"}
          onClose={() => setEditingNode(null)}
          onSave={saveNode}
        />
      )}

      {/* 关系弹窗 */}
      {showRelModal && (
        <RelationshipModal chars={chars} onClose={() => setShowRelModal(false)} onSave={saveRelationship} />
      )}

      {/* 共享人物库 */}
      {showSharedLib && (
        <Modal title="共享人物库" onClose={() => setShowSharedLib(false)} wide>
          {sharedChars.length === 0 ? (
            <EmptyState
              icon="Share2"
              title="还没有共享的人物"
              hint="在某个项目的人物卡片上点「共享」图标，就能把这个角色放进共享库，方便在其他项目里复用。"
            />
          ) : (
            <div className="space-y-2">
              {sharedChars.map((c) => {
                const origin = data.projects.find((p) => p.id === c.projectId);
                return (
                  <div
                    key={c.id}
                    className="flex items-center justify-between px-3 py-2 rounded-sm"
                    style={{ background: COLORS.paperDark }}
                  >
                    <div>
                      <span className="text-sm font-bold" style={{ color: COLORS.ink, fontFamily: "'Noto Serif SC', serif" }}>
                        {c.name}
                      </span>
                      <span className="text-xs ml-2" style={{ color: COLORS.inkSoft }}>
                        来自「{origin?.name || "未知项目"}」
                      </span>
                    </div>
                    {project && c.projectId !== currentProjectId && (
                      <Btn small onClick={() => importSharedCharacter(c)}>
                        <Ico name="Plus" size={12} /> 导入到当前项目
                      </Btn>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </Modal>
      )}

      {/* 导出 */}
      {showExport && (
        <Modal title="导出为 Markdown" onClose={() => setShowExport(false)}>
          <p className="text-xs mb-3" style={{ color: COLORS.inkSoft }}>
            选择要导出的内容，生成的文件可以直接发给编辑看。
          </p>
          <label className="flex items-center gap-2 mb-2 text-sm">
            <input
              type="checkbox"
              checked={exportSel.characters}
              onChange={(e) => setExportSel({ ...exportSel, characters: e.target.checked })}
            />

// ============ 关系图 Tab ============
function GraphTab({ chars, rels, onAddRel, onDeleteRel }) {
  if (chars.length === 0) {
    return <EmptyState icon="Network" title="先添加人物" hint="有了人物之后，才能在这里画出他们之间的关系。" />;
  }
  const size = 420;
  const center = size / 2;
  const radius = Math.min(size / 2 - 70, 60 + chars.length * 8);
  const positions = {};
  chars.forEach((c, i) => {
    const angle = (i / chars.length) * 2 * Math.PI - Math.PI / 2;
    positions[c.id] = { x: center + radius * Math.cos(angle), y: center + radius * Math.sin(angle) };
  });
  return (
    <div className="flex flex-col lg:flex-row gap-6">
      <div className="flex-1 flex justify-center">
        <svg width={size} height={size}>
          {rels.map((r) => {
            const a = positions[r.fromId];
            const b = positions[r.toId];
            if (!a || !b) return null;
            const mx = (a.x + b.x) / 2;
            const my = (a.y + b.y) / 2;
            return (
              <g key={r.id}>
                <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={COLORS.brass} strokeWidth={1.3} />
                <rect x={mx - r.label.length * 4.2 - 4} y={my - 9} width={r.label.length * 8.4 + 8} height={16} fill={COLORS.paper} />
                <text x={mx} y={my + 4} fontSize={11} textAnchor="middle" fill={COLORS.inkSoft} fontFamily="'Noto Sans SC', sans-serif">
                  {r.label}
                </text>
              </g>
            );
          })}
          {chars.map((c) => {
            const p = positions[c.id];
            return (
              <g key={c.id}>
                <circle cx={p.x} cy={p.y} r={30} fill={COLORS.sealSoft} stroke={COLORS.seal} strokeWidth={1.3} />
                <text x={p.x} y={p.y + 4} fontSize={11} textAnchor="middle" fill={COLORS.seal} fontWeight="bold" fontFamily="'Noto Serif SC', serif">
                  {c.name.slice(0, 4)}
                </text>
                <text x={p.x} y={p.y + 40} fontSize={10.5} textAnchor="middle" fill={COLORS.inkSoft}>
                  {c.name}
                </text>
              </g>
            );
          })}
        </svg>
      </div>
      <div className="w-full lg:w-72 shrink-0">
        <Btn small onClick={onAddRel} style={{ marginBottom: 12 }}>
          <Ico name="Plus" size={13} /> 新建关系
        </Btn>
        <div className="space-y-1.5">
          {rels.length === 0 && <p className="text-xs" style={{ color: COLORS.inkSoft }}>还没有关系，点上面按钮添加。</p>}
          {rels.map((r) => {
            const from = chars.find((c) => c.id === r.fromId)?.name || "?";
            const to = chars.find((c) => c.id === r.toId)?.name || "?";
            return (
              <div key={r.id} className="flex items-center justify-between px-3 py-1.5 rounded-sm text-xs" style={{ background: COLORS.paperDark }}>
                <span style={{ color: COLORS.ink }}>
                  {from} <Ico name="ChevronRight" size={10} className="inline" /> {to}：{r.label}
                </span>
                <button onClick={() => onDeleteRel(r.id)}>
                  <Ico name="Trash2" size={12} style={{ color: COLORS.seal }} />
                </button>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function RelationshipModal({ chars, onClose, onSave }) {
  const [form, setForm] = useState({ fromId: chars[0]?.id || "", toId: chars[1]?.id || chars[0]?.id || "", label: "" });

          ))}

          >
            <Ico name="GalleryVerticalEnd" size={12} /> 时间线视图
          </button>
          <button
            onClick={() => setView("grid")}
            className="flex items-center gap-1 px-3 py-1.5 text-xs"
            style={{ background: view === "grid" ? COLORS.sealSoft : "transparent", color: view === "grid" ? COLORS.seal : COLORS.inkSoft }}
          >
            <Ico name="Rows3" size={12} /> {containerLabel}视图
          </button>
        </div>
        <Btn small onClick={onAdd}>
          <Ico name="Plus" size={13} /> 新建{containerLabel}
        </Btn>
      </div>

      {nodes.length === 0 ? (
        <EmptyState icon="ListTree" title={`还没有${containerLabel}`} hint={`把故事拆成一个个${containerLabel}，分别追踪进度和相关人物。`} />
      ) : view === "timeline" ? (
        <div className="relative pl-6">
          <div className="absolute left-[7px] top-1 bottom-1 w-px" style={{ background: COLORS.line }} />
          <div className="space-y-4">
            {nodes.map((n) => (
              <div key={n.id} className="relative">
                <div
                  className="absolute -left-6 top-1.5 w-3.5 h-3.5 rounded-full"
                  style={{ background: STATUS_COLOR[n.status], border: `2px solid ${COLORS.paper}` }}
                />
                <NodeCard n={n} chars={chars} onEdit={onEdit} onDelete={onDelete} />
              </div>
            ))}
          </div>
        </div>
      ) : (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {nodes.map((n) => (
            <NodeCard key={n.id} n={n} chars={chars} onEdit={onEdit} onDelete={onDelete} />
          ))}
        </div>
      )}
    </div>
  );
}

function NodeCard({ n, chars, onEdit, onDelete }) {
  const linked = (n.linkedCharacterIds || []).map((id) => chars.find((c) => c.id === id)?.name).filter(Boolean);
  return (
    <div className="group p-4 rounded-sm" style={{ background: COLORS.paperDark, border: `1px solid ${COLORS.line}` }}>
      <div className="flex items-start justify-between mb-1">
        <span className="text-sm font-bold" style={{ fontFamily: "'Noto Serif SC', serif", color: COLORS.ink }}>
          [{n.order}] {n.name}
        </span>
        <div className="flex gap-1.5 opacity-0 group-hover:opacity-100">
          <button onClick={() => onEdit(n)}><Ico name="Pencil" size={12} style={{ color: COLORS.inkSoft }} /></button>
          <button onClick={() => confirm(`删除「${n.name}」？`) && onDelete(n.id)}><Ico name="Trash2" size={12} style={{ color: COLORS.seal }} /></button>
        </div>
      </div>
      <span className="inline-block text-xs px-2 py-0.5 rounded-sm mb-2" style={{ background: STATUS_SOFT[n.status], color: STATUS_COLOR[n.status] }}>
        {n.status} {n.wordcount ? `· ${n.wordcount}字` : ""}
      </span>
      {n.summary && <p className="text-xs leading-relaxed mb-2 line-clamp-3" style={{ color: COLORS.inkSoft }}>{n.summary}</p>}
      {linked.length > 0 && (
        <p className="text-xs" style={{ color: COLORS.brass }}>相关人物：{linked.join("、")}</p>
      )}
    </div>
  );
}

function NodeModal({ initial, chars, containerLabel, onClose, onSave }) {
  const [form, setForm] = useState({
    name: initial.name || "",
    order: initial.order ?? "",
    status: initial.status || "未写",
    summary: initial.summary || "",
    wordcount: initial.wordcount || "",
    linkedCharacterIds: initial.linkedCharacterIds || [],
  });
  const toggleChar = (id) => {
    setForm((f) => ({
      ...f,
      linkedCharacterIds: f.linkedCharacterIds.includes(id)
        ? f.linkedCharacterIds.filter((x) => x !== id)
        : [...f.linkedCharacterIds, id],
    }));
  };
  return (
    <Modal title={initial.id ? `编辑${containerLabel}` : `新建${containerLabel}`} onClose={onClose} wide>
      <Field label={`${containerLabel}名称 *`}>
        <TextInput value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} />
      </Field>
      <div className="grid grid-cols-2 gap-4">
        <Field label="顺序">
          <TextInput type="number" value={form.order} onChange={(e) => setForm({ ...form, order: Number(e.target.value) })} />
        </Field>
        <Field label="状态">
          <Select value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })}>
            {STATUS_LIST.map((s) => <option key={s} value={s}>{s}</option>)}
          </Select>
        </Field>
      </div>
      <Field label="字数">
        <TextInput type="number" value={form.wordcount} onChange={(e) => setForm({ ...form, wordcount: Number(e.target.value) })} />
      </Field>
      <Field label="剧情概要">
        <TextArea value={form.summary} onChange={(e) => setForm({ ...form, summary: e.target.value })} />
      </Field>
      <Field label="相关人物">
        <div className="flex flex-wrap gap-1.5">
          {chars.length === 0 && <span className="text-xs" style={{ color: COLORS.inkSoft }}>暂无人物</span>}
          {chars.map((c) => (
            <button
              type="button"
              key={c.id}
              onClick={() => toggleChar(c.id)}
              className="text-xs px-2 py-1 rounded-sm"
              style={{
                background: form.linkedCharacterIds.includes(c.id) ? COLORS.sealSoft : COLORS.paperDarker,
                color: form.linkedCharacterIds.includes(c.id) ? COLORS.seal : COLORS.inkSoft,
              }}
            >
              {c.name}
            </button>
          ))}
        </div>
      </Field>
      <div className="flex justify-end gap-2 mt-2">
        <Btn variant="ghost" onClick={onClose}>取消</Btn>
        <Btn onClick={() => form.name.trim() && onSave(form)}>
          <Ico name="Check" size={14} /> 保存
        </Btn>
      </div>
    </Modal>
  );
}
